site:
  tab: RyuChan
  title: RyuChan
  description: 围绕写作系统、内容治理与静态博客运维持续更新的个人博客
  language: zh
  favicon: /favicon.png
  theme:
    light: garden
    dark: dracula
    code: github-dark
  date_format: ddd MMM DD YYYY
  blog:
    pageSize: 8
  banner:
    enableRandom: true
    randomUrl: https://t.alcy.cc/ycy
    randomCount: 5
    height: 60vh
    images:
      - https://tc.alcy.cc/q/20250908/b2d656670551cb9ea6eda7b46b6c8ec0.webp
  icp: 萌ICP备20261117号
  icp_link: https://icp.gov.moe/?keyword=20261117
  pages:
    home:
      title: RyuChan
      subtitle: 围绕写作系统、内容治理与静态博客运维持续更新
      typewriterTexts:
        - 🌸 欲买桂花同载酒，终不似，少年游！
        - 🌸 花有重开日，人无再少年！
        - 🌿 记录生活的点滴，分享美好的瞬间！
        - 📚 纸上得来终觉浅，绝知此事要躬行！
    friend:
      title: 友人帐
      subtitle: 记录那些珍贵的友谊，分享彼此的故事
    about:
      title: 关于
      subtitle: 关于这个博客的关注主题、维护方式与长期方向
      leadParagraphs:
        - 这个站点的重点不是单纯堆积文章数量，而是把博客做成一个能够长期维护、持续迭代的内容系统。
        - 因此我会同时关注写什么、如何组织这些文章，以及怎样让发布流程足够稳定。
      workflowSteps:
        - 先明确文章类型、frontmatter 和目标读者，再开始写作。
        - 发布前至少经过工作区确认、内容校验和生产构建三步检查。
        - 优先维护能代表站点方向的置顶文章，以及可以形成内链网络的操作类文章。
      pillars:
        - icon: lucide:notebook-pen
          title: 写作系统
          description: 围绕主题、节奏和复盘机制持续输出，而不是零散地堆积文章。
        - icon: lucide:files
          title: 内容治理
          description: 用 frontmatter、标签、归档和置顶文章把内容组织成可浏览的结构。
        - icon: lucide:wrench
          title: 静态站点运维
          description: 用 Makefile、构建检查和 Git 流程降低发布摩擦，保证站点长期可维护。
    navigation:
      title: 网站导航
      subtitle: 围绕写作、部署、设计与内容维护整理的常用资源
    anime:
      title: 追番
      subtitle: 记录和分享我喜欢的动漫作品
    project:
      title: Projects
      subtitle: 展示一些个人搭建的项目，搬运工！
    music:
      title: Cloud Music
      subtitle: 沉浸式享受音乐时光
